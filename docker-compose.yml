version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=vulnalyze
      - POSTGRES_PASSWORD=vulnalyze
      - POSTGRES_DB=vulnalyze
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - SECRET_KEY=your-secret-key-here
    depends_on:
      - db
      - redis
      - rabbitmq
    volumes:
      - ./backend:/app
    networks:
      - vulnalyze-network

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=vulnalyze
      - POSTGRES_PASSWORD=vulnalyze
      - POSTGRES_DB=vulnalyze
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vulnalyze-network

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vulnalyze-network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - vulnalyze-network

  celery_worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.services.scanner worker --loglevel=info
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=vulnalyze
      - POSTGRES_PASSWORD=vulnalyze
      - POSTGRES_DB=vulnalyze
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - SECRET_KEY=your-secret-key-here
    depends_on:
      - backend
      - db
      - redis
      - rabbitmq
    networks:
      - vulnalyze-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  vulnalyze-network:
    driver: bridge 